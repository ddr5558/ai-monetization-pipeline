name: 블로그 자동 생성

on:
  schedule:
    - cron: '0 0 * * 1,3,5'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설치
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 의존성 설치
        run: npm install

      - name: 블로그 생성 실행
        run: node blogGenerator.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}